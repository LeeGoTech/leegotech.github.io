<!DOCTYPE html>
<html lang="en">
<head>

  <!-- Layout wrapper -->

      <nav class="layout-navbar navbar navbar-expand-xl align-items-center" id="layout-navbar">
        <div class="container-xxl">
          <div class="navbar-brand app-brand demo d-none d-xl-flex py-0 me-4">
            <a href="#" class="app-brand-link gap-2 cursor-pointer">
              <img src="assets/images/brand.png" alt="brand" style="width: 40px;">
            </a>
          </div>

          <div class="layout-menu-toggle navbar-nav align-items-xl-center me-4 me-xl-0 d-xl-none">
            <a id="navbar-toggler" class="nav-item nav-link px-0 me-xl-6" href="javascript:void(0)">
              <i class="icon-base bx bx-menu icon-md"></i>
            </a>
          </div>

          <div class="navbar-nav-right d-flex align-items-center justify-content-end" id="navbar-collapse">

              <div class="nav-item me-2 me-xl-0">
                <a
                  class="nav-link"
                  id="theme-toggle"
                  href="javascript:void(0);">
                  <i class="icon-base bx bx-sun icon-md theme-icon-active"></i>
                </a>
              </div>
            </div>

            <ul class="navbar-nav flex-row align-items-center ms-md-auto">
              <!-- User -->
              <li class="nav-item navbar-dropdown dropdown-user dropdown">
                <a
                  class="nav-link dropdown-toggle hide-arrow p-0"
                  href="javascript:void(0);">
                  <div class="avatar avatar-online">
                    <img src="assets/images/1.png" alt class="rounded-circle" />

                </a>
                <ul class="dropdown-menu dropdown-menu-start">
                  <li>
                    <a class="dropdown-item" href="#">
                      <div class="d-flex">
                        <div class="flex-shrink-0 me-3">
                          <div class="avatar avatar-online">
                            <img src="assets/images/1.png" alt class="w-px-40 h-auto rounded-circle" />

                        </div>
                        <div class="flex-grow-1">

                          <small class="text-body-secondary">admin@hilot.com</small>
                        </div>
                      </div>
                    </a>
                  </li>
                  <li>
                    <button type="submit" class="dropdown-item d-flex align-items-center">
                      <i class="icon-base bx bx-power-off icon-md me-3"></i>
                      <span>Log Out</span>
                    </button>
                  </li>
                </ul>
              </li>
              <!--/ User -->
            </ul>
          </div>
        </div>

        <div class="content-wrapper">

          <aside id="layout-menu" class="layout-menu-horizontal menu-horizontal menu flex-grow-0">

              <ul class="menu-inner py-1">

                <li class="menu-item active">
                  <a href="/" class="menu-link">
                    <i class="menu-icon icon-base bx bx-home-smile"></i>
                    <div data-i18n="Dashboard">Dashboard</div>
                  </a>
                </li>
              </ul>
            </div>
          </aside>

                      </a>
                    </span>
                  </span>
                  <span class="app-brand-text demo menu-text fw-bold text-heading"></span>
                </a>

                  <i class="icon-base bx bx-chevron-left d-flex align-items-center justify-content-center"></i>
                </a>
              </div>
              <ul class="menu-inner py-1 ps overflow-auto" style="margin-left: 0px;">

                <li class="menu-item active">
                  <a href="/" class="menu-link">
                    <i class="menu-icon icon-base bx bx-home-smile"></i>
                    <div data-i18n="Dashboard">Dashboard</div>
                  </a>
                </li>
              </ul>
              <div class="menu-horizontal-wrapper"></div>
              <a href="#" class="menu-horizontal-next d-none"></a>
            </div>

          <div class="container-xxl flex-grow-1 container-p-y">
            <h1>Hello World!</h1>
          </div>
          <!--/ Content -->

          <div class="content-backdrop fade"></div>
        </div>
        <!--/ Content wrapper -->
      </div>

      <!--/ Layout container -->
    </div>

  <!-- Overlay -->
  <div class="layout-overlay layout-menu-toggle"></div>

  <!-- Drag Target Area To SlideIn Menu On Small Screens -->
  <div class="drag-target"></div>

  <script src="assets/js/theme-toggler.js"></script>
  <script src="assets/js/admin-dashboard.js"></script>

</html>
